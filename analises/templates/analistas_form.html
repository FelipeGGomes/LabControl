{% extends 'index.html' %}

{% block title %}Editar Analista · LabDash{% endblock %}

{% block page_header %}
<h1>Analistas</h1>
<div class="breadcrumb">Dashboard / Analistas / Editar</div>
{% endblock %}

{% block content %}
<div class="stats-grid" style="grid-template-columns: 1fr;"> <!-- apenas um card -->
    <div class="stat-card" style="padding: 28px;">
        <div style="width: 100%;">
            <h2 style="font-size: 1.5rem; margin-bottom: 24px; color: #1e2f44;">
                Editar Analista
            </h2>
            <form method="post" action="{% url 'editar_analista' analista.id %}"
                style="display: flex; flex-direction: column; gap: 20px;">
                {% csrf_token %}
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label for="nome" style="font-weight: 600; color: #2c3f5c;">Nome do Analista:</label>
                    <input type="text" id="nome" name="nome" required value="{{ analista.nome|default:'' }}"
                        style="padding: 14px 16px; border: 1px solid #d0ddee; border-radius: 14px; font-size: 1rem; background: #f9fcff;">
                </div>
                <div style="display: flex; gap: 16px; margin-top: 12px;">
                    <button type="submit" class="btn-outline"
                        style="background: #1a5c9e; color: white; border: none; padding: 12px 28px; border-radius: 30px; font-weight: 600; cursor: pointer;">
                        <i class="fas fa-save"></i> Atualizar
                    </button>
                    <a href="{% url 'analistas' %}" class="btn-outline"
                        style="background: transparent; border: 1px solid #b9cfec; padding: 12px 28px; border-radius: 30px; color: #1e3f66; text-decoration: none;">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
